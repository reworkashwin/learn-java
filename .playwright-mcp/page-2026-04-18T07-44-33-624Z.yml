                    - button "Aspect Oriented Programming." [ref=e1431]
                    - button "All these core concepts, they're going to be explained slowly, clearly, and visually." [ref=e1433]
                    - button "So you understand why things work, not just how." [ref=e1435]
                    - button "Then we move into Spring Boot Essentials, REST APIs Development from Scratch, Request" [ref=e1437]
                    - button "and Response Anatomy, API Design, Best Practices, Versioning Strategies." [ref=e1439]
                    - button "We will build APIs the same way backend teams they build in real enterprise applications." [ref=e1441]
                    - button "Next we go deep into database related concepts like H2Database, MySQL Database, Spring" [ref=e1443]
