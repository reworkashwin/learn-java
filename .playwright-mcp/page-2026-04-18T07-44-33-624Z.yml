                    - button "all in one powerful stack." [ref=e1401]
                    - button "That's why any backend developer who has a very good understanding around the Spring" [ref=e1403]
                    - button "and Spring Boot ecosystem, the demand for them will be high and they're going to get" [ref=e1405]
                    - button "strong salaries and never ending real world problems to solve by using the backend development." [ref=e1407]
                    - button "Inside software industry, almost all the enterprise backend applications, they are built by using" [ref=e1409]
                    - button "the Java, Spring and Spring Boot, whether you're building a banking system, e-commerce" [ref=e1411]
                    - button "Platform, job portals are the next startup idea" [ref=e1413]
                    - button "solid backend skills with Spring Boot are where the real magic happens." [ref=e1415]
                    - button "I hope you're convinced to learn Spring Boot for the Java backend development." [ref=e1417]
                    - button "Now let's try to understand how this entire course is structured." [ref=e1419]
                    - button "We're going to start from the absolute foundations and then steadily move towards the advanced" [ref=e1421]
                    - button "and production ready concepts." [ref=e1423]
