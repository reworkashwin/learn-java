                    - button "Hey there, welcome to the course." [ref=e1337]
                    - button "If you are watching this video, you are probably asking yourself one simple question," [ref=e1339]
                    - button "Is this the right spring and spring boot course for me ?" [ref=e1341]
                    - button "That's a very valid question." [ref=e1343]
                    - button "I'm going to answer the same inside this video." [ref=e1345]
                    - button "I'm Madan Reddy and I have spent years teaching Java developers on how to build real world" [ref=e1347]
                    - button "backend applications." [ref=e1349]
                    - button "And here is what I have learned." [ref=e1351]
                    - button "Knowing core Java is like having a hammer in your hand." [ref=e1353]
                    - button "It's great, but you can't build a house with just a hammer, right ?" [ref=e1355]
                    - button "If you take the same analogy to the software development, if you want to build modern web" [ref=e1357]
                    - button "applications like APIs or microservices that companies actually use in production, core java" [ref=e1359]
                    - button "alone won't cut it." [ref=e1361]
                    - button "Many developers, they learn core Java, write a few programs and then hit a wall." [ref=e1363]
                    - button "They'll ask themselves questions like how do I build a real backend application ?" [ref=e1365]
                    - button "How do I handle security, databases interaction, transactions, caching, logging, deployment?" [ref=e1367]
                    - button "To answer all these questions, this course has been created to bridge that exact gap" [ref=e1369]
                    - button "that every Java professional is going to have." [ref=e1371]
                    - button "Before I try to explain to you about how this course is structured, let me answer one of" [ref=e1373]
                    - button "the burning questions that you may have, which is on why should I learn backend development" [ref=e1375]
                    - button "by using Spring Boot and Spring Framework?" [ref=e1377]
                    - button "In any typical enterprise application, backend developers, they're going to act as a brains" [ref=e1379]
                    - button "for the application." [ref=e1381]
                    - button "As a backend developer, you're going to design the APIs, handle the data that is coming from" [ref=e1383]
                    - button "the client applications." [ref=e1385]
                    - button "You're going to secure the system and make sure everything actually works when users" [ref=e1387]
                    - button "start clicking buttons like crazy on the website or inside a mobile application." [ref=e1389]
                    - button "Inside the Java ecosystem, to build a real enterprise backend applications inside" [ref=e1391]
                    - button "the industry, almost all the Java developers, they are relying on the Spring Boot and Spring Frameworks. why ?" [ref=e1393]
                    - button "Because Spring Boot is like a Swiss army knife." [ref=e1395]
                    - button "It has projects and libraries that are going to help the developers to build the REST APIs," [ref=e1397]
